<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Change - Sarhad Book Depot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        /* Fixed: box-shadow property */
        .card { max-width: 400px; width: 100%; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card p-4 text-center">
        <h4 class="mb-3 text-danger fw-bold">Security Verification</h4>
        <p class="text-muted mb-4">An OTP has been sent to your registered email to confirm this change.</p>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <input type="number" name="otp" class="form-control form-control-lg text-center" placeholder="Enter 6-Digit OTP" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2">Verify & Update</button>
            <a href="/admin/settings" class="btn btn-link text-decoration-none mt-2 text-muted">Cancel</a>
        </form>
    </div>
</body>
</html>
