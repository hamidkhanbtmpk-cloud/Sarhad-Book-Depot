<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Sarhad Book Depot</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: #103554;
            /* Consistent Background */
            background-image: linear-gradient(rgba(16, 53, 84, 0.85), rgba(16, 53, 84, 0.9)), 
                              url('https://images.unsplash.com/photo-1507842217121-9e96e4430330?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: white;
            position: relative;
            text-align: center;
        }

        .brand-title h3 {
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .brand-title p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Inputs */
        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background: white;
            box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.3);
        }

        .input-group-text {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 10px 0 0 10px;
            color: #103554;
        }
        .form-control.ps-0 { border-radius: 0 10px 10px 0; }

        /* Button */
        .btn-login {
            background: #eab308; /* Gold */
            color: #103554;
            font-weight: 700;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #ca9a04;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(234, 179, 8, 0.3);
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }
        .back-home:hover { opacity: 1; transform: translateX(-5px); }

        .alert-custom {
            background: rgba(220, 53, 69, 0.8);
            color: white;
            border: none;
            font-size: 0.85rem;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <a href="/login" class="back-home"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>

    <div class="login-card" data-aos="fade-up" data-aos-duration="800">
        
        <div class="brand-title">
            <div class="mb-3">
                <i class="bi bi-envelope-exclamation-fill display-4 text-warning"></i>
            </div>
            <h3>RESET PASSWORD</h3>
            <p>Enter your email to receive a reset code</p>
        </div>

        {% if error %}
        <div class="alert alert-custom d-flex align-items-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="input-group mb-4">
                <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                <input type="email" name="email" class="form-control ps-0" placeholder="Registered Email Address" required>
            </div>

            <button type="submit" class="btn-login">Send OTP</button>
        </form>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
