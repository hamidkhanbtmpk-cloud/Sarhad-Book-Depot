<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Sarhad Book Depot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* --- SHARED CSS (Consistent Theme) --- */
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sidebar Color (Royal Blue) */
        .bg-custom-sidebar {
            background-color: #103554; 
        }

        #wrapper {
            overflow-x: hidden;
            display: flex;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            margin-left: 0;
            transition: margin 0.25s ease-out;
            width: 16rem;
            position: fixed;
            z-index: 1000;
        }

        #page-content-wrapper {
            width: 100%;
            margin-left: 16rem;
            transition: margin 0.25s ease-out;
        }

        body.sb-sidenav-toggled #sidebar-wrapper {
            margin-left: -16rem;
        }

        body.sb-sidenav-toggled #page-content-wrapper {
            margin-left: 0;
        }

        /* Sidebar Links */
        .sidebar-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-left: 4px solid transparent;
            transition: all 0.3s;
        }
        
        .sidebar-link:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
        }

        .sidebar-link.active {
            background: rgba(255,255,255,0.2);
            border-left-color: #0d6efd; 
            color: #fff;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #sidebar-wrapper { margin-left: -16rem; }
            #page-content-wrapper { margin-left: 0; }
            body.sb-sidenav-toggled #sidebar-wrapper { margin-left: 0; }
            body.sb-sidenav-toggled #page-content-wrapper { margin-left: 0; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    
    {% include 'admin_sidebar.html' %}

    <div id="page-content-wrapper">
        <nav class="navbar navbar-light bg-white py-3 px-4 shadow-sm mb-4">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-dark me-3" id="sidebarToggle">
                    <i class="bi bi-list fs-5"></i>
                </button>
                <h4 class="m-0 fw-bold">Edit Staff Profile</h4>
            </div>
            <a href="/logout" class="btn btn-danger btn-sm text-white rounded-pill px-3">Logout</a>
        </nav>

        <div class="container px-4">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-header bg-white py-3 text-center border-0">
                            <h5 class="mb-0 fw-bold text-primary">Update Employee Details</h5>
                        </div>
                        <div class="card-body p-4">
                            
                            <form method="POST" enctype="multipart/form-data">
                                
                                <div class="text-center mb-4">
                                    <div class="position-relative d-inline-block">
                                        {% if user.profile_pic %}
                                            <img src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}" class="rounded-circle border border-3 border-light shadow" width="120" height="120" style="object-fit: cover;">
                                        {% else %}
                                            <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white mx-auto shadow" style="width:120px; height:120px; font-size: 2.5rem;">
                                                {{ user.full_name[0] }}
                                            </div>
                                        {% endif %}
                                        
                                        </div>
                                    <h4 class="mt-3 fw-bold">{{ user.full_name }}</h4>
                                    <p class="text-muted small">{{ user.username }}</p>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Change Profile Picture</label>
                                    <input type="file" name="profile_pic" accept="image/*" class="form-control form-control-sm">
                                </div>

                                <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">Personal Details</h6>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Full Name</label>
                                        <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Phone Number</label>
                                        <input type="text" name="phone" class="form-control" value="{{ user.phone }}" required>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">CNIC No</label>
                                        <input type="text" name="cnic" class="form-control" value="{{ user.cnic or '' }}" placeholder="XXXXX-XXXXXXX-X">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Date of Birth</label>
                                        <input type="date" name="dob" class="form-control" value="{{ user.dob or '' }}">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label small fw-bold">Home Address</label>
                                    <textarea name="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
                                </div>

                                <h6 class="text-success fw-bold mb-3 border-bottom pb-2">Job Details</h6>
                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Job Title</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-person-badge"></i></span>
                                            <input type="text" name="job_title" class="form-control" value="{{ user.job_title or '' }}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Monthly Salary (Rs)</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light">Rs.</span>
                                            <input type="number" step="0.01" name="salary" class="form-control" value="{{ user.salary }}">
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary fw-bold rounded-pill py-2">
                                        <i class="bi bi-check-circle-fill me-2"></i> Update Full Profile
                                    </button>
                                    <a href="/admin/employees" class="btn btn-light text-muted rounded-pill py-2">Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Sidebar Toggle
    window.addEventListener('DOMContentLoaded', event => {
        const sidebarToggle = document.body.querySelector('#sidebarToggle');
        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', event => {
                event.preventDefault();
                document.body.classList.toggle('sb-sidenav-toggled');
            });
        }
    });
</script>

</body>
</html>
